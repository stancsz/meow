# =========================================================================
# Harvest Pipeline
# =========================================================================
# How to process this watchlist:
#
# 1. P1 sources → create docs/harvest/<name>.md → run harvest --once
# 2. P2 sources → create docs/harvest/<name>.md when ready
# 3. P3 sources → monitor, no action needed yet
# 4. category=harvested → already done or in progress
#
# Adding a new source to watchlist.yaml:
#   - Add entry with url, priority, why
#   - Create docs/harvest/<name>.md with minimalSlice
#   - Run: bun run src/tools/harvest.ts --once
#
# The harvest tool reads this watchlist via competitor docs auto-detection.
