version: "3.9"

services:
  agent-harness:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - HOME=/home/appuser
      - SHELL=/bin/bash
      - GH_PAT=${GH_PAT}
      - BACKUP_REPO=${BACKUP_REPO:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-https://api.minimax.io/anthropic}
      - LLM_API_KEY=${ANTHROPIC_API_KEY}
      - LLM_BASE_URL=${ANTHROPIC_BASE_URL:-https://api.minimax.io/anthropic}
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped
    volumes:
      - ./mcp-null.json:/app/mcp-null.json:ro
      - ./mcp-bridge.json:/app/mcp-bridge.json:ro
      - ./data:/app/data
      - ./.claude:/app/.claude
      - ../agent-kernel:/app/agent-kernel:rw
      - ./JOB.md:/app/JOB.md:ro