version: "3.9"

services:
  agent-harness:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - HOME=/home/appuser
      - SHELL=/bin/bash
      - GH_PAT=${GH_PAT}
      - BACKUP_REPO=${BACKUP_REPO:-}
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped
    volumes:
      - ./mcp-null.json:/app/mcp-null.json:ro
      - ./mcp-bridge.json:/app/mcp-bridge.json:ro
      - ./data:/app/data
      - ./.claude:/app/.claude