version: "3.9"

services:
  claude-bridge-docker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - HOME=/home/appuser
      - SHELL=/bin/bash
    restart: unless-stopped
    volumes:
      - ./mcp-null.json:/app/mcp-null.json:ro
      - ./data:/app/data