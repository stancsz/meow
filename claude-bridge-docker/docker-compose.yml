version: "3.9"

services:
  claude-bridge-docker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - HOME=/home/appuser
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL}
      - GH_PAT=${GH_PAT}
    restart: unless-stopped
    volumes:
      - ./mcp-null.json:/app/mcp-null.json:ro