name: Smart Job Delegator

on:
  schedule:
    - cron: "30 * * * *" # Runs every hour at minute 30
  workflow_dispatch: # Allows manual trigger
    inputs:
      steering_prompt:
        description: 'Steering prompt for Jules (takes priority over automated delegation)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  delegate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Dependencies
        run: |
          npm install -g tsx chalk openai dotenv
          # Install project deps if needed
          if [ -f package.json ]; then npm ci || npm install; fi

      - name: Run Job Delegator
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          MODEL: "MiniMax-M2.7"
          STEERING_PROMPT: ${{ github.event.inputs.steering_prompt }}
        run: npx tsx .github/scripts/orchestrator.ts
